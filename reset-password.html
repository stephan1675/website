<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal - Passwort zurücksetzen</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* Custom adjustments for reset password page */
    .reset-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      width: 100%;
      padding: 2rem;
    }
    .alert {
      padding: 1rem;
      border-radius: var(--border-radius-md);
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      line-height: 1.4;
      animation: fadeIn 0.3s ease-out;
    }
    .alert-danger {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }
    .alert-success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: #a7f3d0;
    }
    .hidden {
      display: none !important;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="reset-container">
    <div class="glass-card">
      
      <!-- Reset Form View -->
      <div id="reset-form-view">
        <div class="auth-header">
          <div class="logo">Portal.</div>
          <p>Vergeben Sie ein neues, sicheres Passwort</p>
        </div>
        
        <!-- Alerts for Error/Success -->
        <div id="alert-box" class="alert hidden"></div>
        
        <form id="reset-password-form" autocomplete="off">
          <div class="form-group">
            <label for="new-password">Neues Passwort</label>
            <div class="input-wrapper">
              <input type="password" id="new-password" class="form-control" placeholder="Mind. 8 Zeichen" required>
              <i class="fa-solid fa-lock input-icon"></i>
              <button type="button" class="password-toggle" aria-label="Passwort anzeigen">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
            
            <!-- Password Strength Indicator -->
            <div class="strength-container">
              <div class="strength-bar-wrapper">
                <div id="strength-bar" class="strength-bar"></div>
              </div>
              <span id="strength-text" class="strength-text">Passwortstärke</span>
            </div>
          </div>
          
          <div class="form-group">
            <label for="confirm-password">Passwort bestätigen</label>
            <div class="input-wrapper">
              <input type="password" id="confirm-password" class="form-control" placeholder="Passwort wiederholen" required>
              <i class="fa-solid fa-lock input-icon"></i>
              <button type="button" class="password-toggle" aria-label="Passwort anzeigen">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </div>
          
          <button type="submit" class="btn btn-primary" id="btn-submit">
            <span>Passwort ändern</span>
            <i class="fa-solid fa-key"></i>
          </button>
        </form>
        
        <div class="auth-footer">
          <span>Zurück zur </span>
          <a href="index.html">Startseite</a>
        </div>
      </div>
      
      <!-- Success State View (Hidden initially) -->
      <div id="reset-success-view" class="hidden">
        <div class="auth-header">
          <div class="logo">Erfolg!</div>
          <p>Ihr Passwort wurde erfolgreich aktualisiert.</p>
        </div>
        
        <div style="text-align: center; margin: 2rem 0; font-size: 4rem; color: var(--color-success); filter: drop-shadow(0 0 15px var(--color-success-glow));">
          <i class="fa-solid fa-circle-check"></i>
        </div>
        
        <a href="index.html" class="btn btn-primary">
          <span>Zum Login</span>
          <i class="fa-solid fa-arrow-right-to-bracket"></i>
        </a>
      </div>

    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const resetFormView = document.getElementById('reset-form-view');
      const resetSuccessView = document.getElementById('reset-success-view');
      const resetForm = document.getElementById('reset-password-form');
      const newPasswordInput = document.getElementById('new-password');
      const confirmPasswordInput = document.getElementById('confirm-password');
      const strengthBar = document.getElementById('strength-bar');
      const strengthText = document.getElementById('strength-text');
      const alertBox = document.getElementById('alert-box');
      const btnSubmit = document.getElementById('btn-submit');
      
      // Extract token from URL search parameters
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      
      if (!token) {
        showAlert('Ungültiger oder fehlender Link. Bitte fordern Sie erneut einen Link an.', 'danger');
        btnSubmit.disabled = true;
      }
      
      // Password visibility toggles
      document.querySelectorAll('.password-toggle').forEach(button => {
        button.addEventListener('click', (e) => {
          e.preventDefault();
          const input = button.previousElementSibling;
          const icon = button.querySelector('i');
          if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
          } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
          }
        });
      });
      
      // Password strength check
      newPasswordInput.addEventListener('input', () => {
        const password = newPasswordInput.value;
        let strength = 0;
        
        if (password.length >= 8) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password) || /[^A-Za-z0-9]/.test(password)) strength++;
        
        strengthBar.className = 'strength-bar';
        
        if (password.length === 0) {
          strengthText.textContent = 'Passwortstärke';
          strengthText.style.color = 'var(--color-text-muted)';
        } else if (strength === 1) {
          strengthBar.classList.add('strength-weak');
          strengthText.textContent = 'Schwach (Mindestens 8 Zeichen, Großbuchstaben, Zahlen)';
          strengthText.style.color = 'var(--color-danger)';
        } else if (strength === 2) {
          strengthBar.classList.add('strength-medium');
          strengthText.textContent = 'Mittelschwer (Füge Zahlen oder Sonderzeichen hinzu)';
          strengthText.style.color = 'var(--color-warning)';
        } else if (strength === 3) {
          strengthBar.classList.add('strength-strong');
          strengthText.textContent = 'Sehr starkes Passwort!';
          strengthText.style.color = 'var(--color-success)';
        }
      });
      
      // Form submit handler
      resetForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const password = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;
        
        if (password.length < 8) {
          showAlert('Das Passwort muss mindestens 8 Zeichen lang sein.', 'danger');
          return;
        }
        
        if (password !== confirmPassword) {
          showAlert('Die Passwörter stimmen nicht überein.', 'danger');
          return;
        }
        
        // Disable button while processing
        btnSubmit.disabled = true;
        btnSubmit.querySelector('span').textContent = 'Wird geändert...';
        
        // Base API URL detection
        let apiBase = '';
        if (window.location.hostname === 'localhost' || 
            window.location.hostname === '127.0.0.1' || 
            window.location.protocol === 'file:') {
          apiBase = 'http://localhost:8000';
        } else {
          apiBase = 'https://website-qcox.onrender.com';
        }
        
        fetch(`${apiBase}/api/auth/reset-password`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            token: token,
            password: password
          })
        })
        .then(response => response.json().then(data => {
          if (!response.ok) {
            throw new Error(data.message || 'Verbindungsfehler zum Server.');
          }
          return data;
        }))
        .then(data => {
          // Success view transition
          resetFormView.classList.add('hidden');
          resetSuccessView.classList.remove('hidden');
        })
        .catch(err => {
          showAlert(err.message, 'danger');
          btnSubmit.disabled = false;
          btnSubmit.querySelector('span').textContent = 'Passwort ändern';
        });
      });
      
      function showAlert(message, type) {
        alertBox.innerHTML = '';
        alertBox.className = `alert alert-${type}`;
        
        let iconClass = 'fa-solid fa-circle-exclamation';
        if (type === 'success') iconClass = 'fa-solid fa-circle-check';
        
        alertBox.innerHTML = `
          <i class="${iconClass}"></i>
          <span>${message}</span>
        `;
        alertBox.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
